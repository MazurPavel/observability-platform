services:
  db:
    image: postgres:16
    container_name: obs_db
    environment:
      POSTGRES_USER: obs
      POSTGRES_PASSWORD: obs
      POSTGRES_DB: observability
    ports:
      - "5432:5432"
    volumes:
      - obs_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obs -d observability"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: ./api
    container_name: obs_api
    environment:
      DATABASE_URL: postgresql://obs:obs@db:5432/observability
      METRICS_INTERVAL_SECONDS: "3"
      SEED_SERVICES_COUNT: "8"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    container_name: obs_web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  obs_db_data: